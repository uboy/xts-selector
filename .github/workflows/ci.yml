name: CI

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  validate-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e . && pip install pytest
      - name: validate-fast
        run: make validate-fast

  validate-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e . && pip install pytest
      - name: validate-graph
        run: make validate-graph

  validate-universal-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e . && pip install pytest
      - name: validate-universal-impact
        run: make validate-universal-impact

  validate-pr-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e . && pip install pytest
      - name: validate-pr-benchmark
        run: make validate-pr-benchmark
